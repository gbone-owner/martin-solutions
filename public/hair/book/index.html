<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Time — Salong Harmoni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080c;
  --surface: #111116;
  --card: #1a1a22;
  --card-hover: #22222e;
  --input: #1e1e28;
  --text: #eeeae0;
  --text2: #b0a890;
  --text3: #6a6458;
  --accent: #d4af37;
  --accent2: #f0d060;
  --accent-bg: rgba(212,175,55,0.08);
  --accent-bg2: rgba(212,175,55,0.16);
  --accent-border: rgba(212,175,55,0.18);
  --accent-border2: rgba(212,175,55,0.3);
  --green: #5cd87a;
  --green-bg: rgba(92,216,122,0.1);
  --red: #e85a5a;
  --red-bg: rgba(232,90,90,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ═══ LAYOUT ═══ */
.page {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 0 20px 40px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ═══ HEADER ═══ */
.header {
  padding: 24px 0 20px;
  text-align: center;
}
.salon-name {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}
.header h1 {
  font-size: 26px;
  font-weight: 900;
  line-height: 1.2;
}
.header-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 6px;
}

/* ═══ STEPS INDICATOR ═══ */
.steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 0 24px;
}
.step-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.3s;
}
.step-dot.active {
  background: var(--accent);
  border-color: var(--accent);
  width: 24px;
  border-radius: 4px;
}
.step-dot.done {
  background: var(--accent);
  border-color: var(--accent);
  opacity: 0.4;
}

/* ═══ STEP PANELS ═══ */
.step-panel {
  display: none;
  animation: fadeUp 0.3s ease;
}
.step-panel.active { display: block; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to { opacity:1; transform:translateY(0); }
}

.step-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text2);
}

/* ═══ SERVICE CARDS ═══ */
.service-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.service-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: var(--radius);
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.service-card:hover { background: var(--card-hover); }
.service-card.selected {
  border-color: var(--accent-border2);
  background: var(--accent-bg);
}
.service-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.service-card.selected .service-icon {
  background: var(--accent-bg2);
}
.service-info { flex:1; }
.service-name {
  font-size: 14px;
  font-weight: 700;
}
.service-detail {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
}
.service-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* ═══ EMPLOYEE CARDS ═══ */
.employee-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.employee-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: var(--radius);
  padding: 18px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.employee-card:hover { background: var(--card-hover); }
.employee-card.selected {
  border-color: var(--accent-border2);
  background: var(--accent-bg);
}
.employee-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent-bg2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin: 0 auto 10px;
}
.employee-card.selected .employee-avatar {
  box-shadow: 0 0 0 2px var(--accent);
}
.employee-name {
  font-size: 13px;
  font-weight: 700;
}
.employee-role {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.anyone-card {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
}
.anyone-card .employee-avatar {
  margin: 0;
  width: 44px; height: 44px;
  font-size: 18px;
}

/* ═══ DATE PICKER ═══ */
.date-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.date-scroll::-webkit-scrollbar { display:none; }

.date-chip {
  flex-shrink: 0;
  width: 62px;
  padding: 12px 8px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.date-chip:hover { background: var(--card-hover); }
.date-chip.selected {
  border-color: var(--accent-border2);
  background: var(--accent-bg);
}
.date-chip.today {
  border-color: var(--accent-border);
}
.date-day {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.date-num {
  font-size: 20px;
  font-weight: 800;
  margin-top: 4px;
}
.date-chip.selected .date-num { color: var(--accent); }
.date-month {
  font-size: 9px;
  color: var(--text3);
  margin-top: 2px;
}

/* ═══ TIME SLOTS ═══ */
.time-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 16px 0 10px;
}
.time-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.time-slot {
  padding: 12px 8px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: var(--radius-sm);
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  font-weight: 600;
}
.time-slot:hover { background: var(--card-hover); }
.time-slot.selected {
  border-color: var(--accent-border2);
  background: var(--accent-bg);
  color: var(--accent);
}
.time-slot.unavailable {
  opacity: 0.25;
  pointer-events: none;
  text-decoration: line-through;
}

/* ═══ SUMMARY / CONFIRMATION ═══ */
.summary-card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.03);
  border-radius: var(--radius);
  padding: 20px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.summary-row:last-child { border-bottom: none; }
.summary-label {
  font-size: 12px;
  color: var(--text3);
}
.summary-value {
  font-size: 14px;
  font-weight: 600;
  text-align: right;
}
.summary-total {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}

/* ═══ INPUT ═══ */
.input-group {
  margin-bottom: 14px;
}
.input-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.input-field {
  width: 100%;
  padding: 14px 16px;
  background: var(--input);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.input-field:focus {
  border-color: var(--accent-border2);
}
.input-field::placeholder {
  color: var(--text3);
}

/* ═══ BUTTONS ═══ */
.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  padding: 16px;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  text-align: center;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover {
  background: var(--accent2);
}
.btn-primary:disabled {
  opacity: 0.3;
  cursor: default;
}
.btn-secondary {
  background: var(--card);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.06);
}
.btn-secondary:hover {
  background: var(--card-hover);
}

/* ═══ CONFIRMATION SCREEN ═══ */
.confirm-screen {
  text-align: center;
  padding: 40px 0 20px;
}
.confirm-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
.confirm-title {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 8px;
}
.confirm-sub {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.5;
  max-width: 300px;
  margin: 0 auto;
}
.confirm-details {
  margin-top: 28px;
}
.confirm-add-cal {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
  transition: all 0.2s;
}
.confirm-add-cal:hover {
  background: var(--card-hover);
}

/* ═══ FOOTER ═══ */
.page-footer {
  text-align: center;
  padding: 24px 20px;
  font-size: 11px;
  color: var(--text3);
}
.page-footer a {
  color: var(--accent);
  text-decoration: none;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 400px) {
  .employee-grid {
    gap: 8px;
  }
  .time-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
}
@media (min-width: 600px) {
  .header { padding-top: 40px; }
  .header h1 { font-size: 30px; }
}
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="salon-name">Salong Harmoni</div>
    <h1>Book din time</h1>
    <div class="header-sub">Velg tjeneste, fris&oslash;r og tidspunkt</div>
  </div>

  <!-- STEPS -->
  <div class="steps" id="steps">
    <div class="step-dot active" data-step="1"></div>
    <div class="step-dot" data-step="2"></div>
    <div class="step-dot" data-step="3"></div>
    <div class="step-dot" data-step="4"></div>
  </div>

  <!-- ═══ STEP 1: SERVICE ═══ -->
  <div class="step-panel active" id="step-1">
    <div class="step-title">Hva vil du bestille?</div>
    <div class="service-grid" id="service-list"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-to-2" disabled onclick="goStep(2)">Velg fris&oslash;r &rarr;</button>
    </div>
  </div>

  <!-- ═══ STEP 2: EMPLOYEE ═══ -->
  <div class="step-panel" id="step-2">
    <div class="step-title">Hvem vil du til?</div>
    <div class="employee-grid" id="employee-list"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(1)">&larr; Tilbake</button>
      <button class="btn btn-primary" id="btn-to-3" disabled onclick="goStep(3)">Velg tid &rarr;</button>
    </div>
  </div>

  <!-- ═══ STEP 3: DATE & TIME ═══ -->
  <div class="step-panel" id="step-3">
    <div class="step-title">N&aring;r passer det?</div>
    <div class="date-scroll" id="date-scroll"></div>
    <div id="time-sections"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(2)">&larr; Tilbake</button>
      <button class="btn btn-primary" id="btn-to-4" disabled onclick="goStep(4)">Bekreft &rarr;</button>
    </div>
  </div>

  <!-- ═══ STEP 4: CONTACT & CONFIRM ═══ -->
  <div class="step-panel" id="step-4">
    <div class="step-title">Bekreft din time</div>

    <div class="summary-card" id="summary-card"></div>

    <div style="margin-top:20px;">
      <div class="input-group">
        <div class="input-label">Navn</div>
        <input class="input-field" type="text" id="input-name" placeholder="Ditt fulle navn" oninput="checkForm()">
      </div>
      <div class="input-group">
        <div class="input-label">Mobilnummer</div>
        <input class="input-field" type="tel" id="input-phone" placeholder="4XX XX XXX" oninput="checkForm()">
      </div>
      <div class="input-group">
        <div class="input-label">Kommentar (valgfritt)</div>
        <input class="input-field" type="text" id="input-comment" placeholder="Noe vi b&oslash;r vite?">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goStep(3)">&larr; Tilbake</button>
      <button class="btn btn-primary" id="btn-confirm" disabled onclick="confirmBooking()">Bekreft booking</button>
    </div>
  </div>

  <!-- ═══ STEP 5: DONE ═══ -->
  <div class="step-panel" id="step-5">
    <div class="confirm-screen">
      <div class="confirm-icon">&#10003;</div>
      <div class="confirm-title">Timen er booket!</div>
      <div class="confirm-sub">Du f&aring;r en bekreftelse p&aring; SMS. Vi gleder oss til &aring; se deg!</div>

      <div class="confirm-details">
        <div class="summary-card" id="final-summary"></div>
      </div>

      <button class="confirm-add-cal" onclick="addToCalendar()">
        &#128197; Legg til i kalender
      </button>
    </div>
  </div>

</div>

<div class="page-footer">
  Drevet av <a href="https://martin.solutions" target="_blank">Martin.Solutions</a>
</div>

<script>
// ═══ DATA ═══
const SERVICES = [
  { id:'klipp',       name:'Klipp',             icon:'\u2702\uFE0F', time:45,  price:590  },
  { id:'klipp-farge', name:'Klipp & farge',      icon:'\uD83C\uDFA8', time:90,  price:1290 },
  { id:'balayage',    name:'Balayage',           icon:'\u2728',       time:120, price:1890 },
  { id:'klipp-fon',   name:'Klipp & f\u00F8n',   icon:'\uD83D\uDCA8', time:60,  price:790  },
  { id:'herreklipp',  name:'Herreklipp',         icon:'\uD83D\uDC88', time:30,  price:390  },
  { id:'skjegg',      name:'Skjegg & klipp',     icon:'\uD83E\uDDD4', time:45,  price:490  },
  { id:'farge',       name:'Farge',              icon:'\uD83C\uDF08', time:60,  price:990  },
  { id:'behandling',  name:'Keratinbehandling',  icon:'\uD83E\uDDF4', time:90,  price:1490 }
];

const EMPLOYEES = [
  { id:'lena',  name:'Lena',  role:'Fris\u00F8r',           avatar:'\uD83D\uDC69\u200D\uD83E\uDDB0' },
  { id:'oda',   name:'Oda',   role:'Fris\u00F8r',           avatar:'\uD83D\uDC69\u200D\uD83E\uDDB1' },
  { id:'priya', name:'Priya', role:'Fris\u00F8r',           avatar:'\uD83D\uDC69\u200D\uD83E\uDDB3' },
  { id:'jonas', name:'Jonas', role:'Barber',                avatar:'\uD83E\uDDD4' }
];

const DAYS_NO = ['S\u00F8n','Man','Tir','Ons','Tor','Fre','L\u00F8r'];
const MONTHS_NO = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];

// ═══ STATE ═══
let selectedService = null;
let selectedEmployee = null;
let selectedDate = null;
let selectedTime = null;
let currentStep = 1;

// ═══ INIT ═══
function init() {
  renderServices();
  renderEmployees();
  renderDates();
}

// ═══ RENDER SERVICES ═══
function renderServices() {
  const el = document.getElementById('service-list');
  el.innerHTML = SERVICES.map(s => `
    <div class="service-card" onclick="pickService('${s.id}')" id="svc-${s.id}">
      <div class="service-icon">${s.icon}</div>
      <div class="service-info">
        <div class="service-name">${s.name}</div>
        <div class="service-detail">${s.time} min</div>
      </div>
      <div class="service-price">${s.price} kr</div>
    </div>
  `).join('');
}

function pickService(id) {
  selectedService = SERVICES.find(s => s.id === id);
  document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('svc-'+id).classList.add('selected');
  document.getElementById('btn-to-2').disabled = false;
}

// ═══ RENDER EMPLOYEES ═══
function renderEmployees() {
  const el = document.getElementById('employee-list');
  const anyone = `
    <div class="employee-card anyone-card" onclick="pickEmployee('anyone')" id="emp-anyone">
      <div class="employee-avatar">\uD83C\uDFB2</div>
      <div>
        <div class="employee-name">F\u00F8rste ledige</div>
        <div class="employee-role">Hvem som helst som er ledig</div>
      </div>
    </div>`;
  const cards = EMPLOYEES.map(e => `
    <div class="employee-card" onclick="pickEmployee('${e.id}')" id="emp-${e.id}">
      <div class="employee-avatar">${e.avatar}</div>
      <div class="employee-name">${e.name}</div>
      <div class="employee-role">${e.role}</div>
    </div>
  `).join('');
  el.innerHTML = anyone + cards;
}

function pickEmployee(id) {
  if (id === 'anyone') {
    selectedEmployee = { id:'anyone', name:'F\u00F8rste ledige', role:'', avatar:'\uD83C\uDFB2' };
  } else {
    selectedEmployee = EMPLOYEES.find(e => e.id === id);
  }
  document.querySelectorAll('.employee-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('emp-'+id).classList.add('selected');
  document.getElementById('btn-to-3').disabled = false;
}

// ═══ RENDER DATES ═══
function renderDates() {
  const el = document.getElementById('date-scroll');
  const today = new Date();
  let html = '';
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dayName = DAYS_NO[d.getDay()];
    const dateNum = d.getDate();
    const monthName = MONTHS_NO[d.getMonth()];
    const key = d.toISOString().split('T')[0];
    const isToday = i === 0;
    const isSunday = d.getDay() === 0;
    html += `
      <div class="date-chip ${isToday ? 'today' : ''} ${isSunday ? 'unavailable' : ''}"
           onclick="${isSunday ? '' : "pickDate('"+key+"',this)"}" id="date-${key}"
           ${isSunday ? 'style="opacity:0.25;pointer-events:none;"' : ''}>
        <div class="date-day">${isToday ? 'I dag' : dayName}</div>
        <div class="date-num">${dateNum}</div>
        <div class="date-month">${monthName}</div>
      </div>`;
  }
  el.innerHTML = html;
}

function pickDate(key, el) {
  selectedDate = key;
  selectedTime = null;
  document.getElementById('btn-to-4').disabled = true;
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  renderTimeSlots();
}

// ═══ RENDER TIME SLOTS ═══
function renderTimeSlots() {
  const container = document.getElementById('time-sections');
  if (!selectedDate) { container.innerHTML = ''; return; }

  // Generate realistic available slots
  const morning = ['09:00','09:30','10:00','10:30','11:00','11:30'];
  const afternoon = ['12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30'];
  const evening = ['16:00','16:30','17:00','17:30'];

  // Randomly mark some as unavailable for realism
  const seed = selectedDate.split('-').reduce((a,b) => a + parseInt(b), 0);
  const unavail = new Set();
  for (let i = 0; i < 6; i++) {
    const allSlots = [...morning, ...afternoon, ...evening];
    unavail.add(allSlots[(seed * (i+3) * 7) % allSlots.length]);
  }

  function renderSlots(slots, label) {
    const available = slots.filter(s => !unavail.has(s));
    if (available.length === 0) return '';
    let html = `<div class="time-section-label">${label}</div><div class="time-grid">`;
    slots.forEach(s => {
      const isUnavail = unavail.has(s);
      html += `<div class="time-slot ${isUnavail ? 'unavailable' : ''}"
                    onclick="${isUnavail ? '' : "pickTime('"+s+"',this)"}">${s}</div>`;
    });
    html += '</div>';
    return html;
  }

  container.innerHTML =
    renderSlots(morning, 'Formiddag') +
    renderSlots(afternoon, 'Ettermiddag') +
    renderSlots(evening, 'Kveld');
}

function pickTime(time, el) {
  selectedTime = time;
  document.querySelectorAll('.time-slot').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('btn-to-4').disabled = false;
}

// ═══ STEP NAVIGATION ═══
function goStep(n) {
  currentStep = n;
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('step-'+n).classList.add('active');

  // Update dots
  document.querySelectorAll('.step-dot').forEach((dot, i) => {
    dot.classList.remove('active','done');
    const stepNum = i + 1;
    if (stepNum === n) dot.classList.add('active');
    else if (stepNum < n) dot.classList.add('done');
  });

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Render summary on step 4
  if (n === 4) renderSummary();
}

// ═══ SUMMARY ═══
function renderSummary() {
  const dateObj = new Date(selectedDate + 'T12:00:00');
  const dayName = DAYS_NO[dateObj.getDay()];
  const dateNum = dateObj.getDate();
  const monthName = MONTHS_NO[dateObj.getMonth()];
  const dateStr = `${dayName} ${dateNum}. ${monthName}`;

  const html = `
    <div class="summary-row">
      <div class="summary-label">Tjeneste</div>
      <div class="summary-value">${selectedService.name}</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Fris\u00F8r</div>
      <div class="summary-value">${selectedEmployee.name}</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Dato</div>
      <div class="summary-value">${dateStr}</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Tidspunkt</div>
      <div class="summary-value">${selectedTime}</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Varighet</div>
      <div class="summary-value">${selectedService.time} min</div>
    </div>
    <div class="summary-row">
      <div class="summary-label">Pris</div>
      <div class="summary-value summary-total">${selectedService.price} kr</div>
    </div>`;
  document.getElementById('summary-card').innerHTML = html;
}

function checkForm() {
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  document.getElementById('btn-confirm').disabled = !(name.length > 1 && phone.length > 5);
}

// ═══ CONFIRM ═══
function confirmBooking() {
  // Copy summary to final
  document.getElementById('final-summary').innerHTML = document.getElementById('summary-card').innerHTML;
  // Add name row
  const name = document.getElementById('input-name').value.trim();
  const nameRow = `<div class="summary-row"><div class="summary-label">Booket av</div><div class="summary-value">${name}</div></div>`;
  document.getElementById('final-summary').innerHTML = nameRow + document.getElementById('final-summary').innerHTML;

  goStep(5);
}

// ═══ CALENDAR ═══
function addToCalendar() {
  const dateObj = new Date(selectedDate + 'T' + selectedTime + ':00');
  const endObj = new Date(dateObj.getTime() + selectedService.time * 60000);
  const fmt = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(selectedService.name + ' - Salong Harmoni')}&dates=${fmt(dateObj)}/${fmt(endObj)}&details=${encodeURIComponent('Booket via martin.solutions')}&location=${encodeURIComponent('Salong Harmoni')}`;
  window.open(url, '_blank');
}

// ═══ START ═══
init();
</script>
