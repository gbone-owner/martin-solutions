name = "martin-solutions"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext build output
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "martin-solutions-db"
database_id = "3c1e767c-7c0f-4664-88b8-133e33e8f2b8"

# Workers AI
[ai]
binding = "AI"
